<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Particle Garden</title>
<style>
  :root {
    color-scheme: dark;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #05050a;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-user-select: none;
    user-select: none;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
    touch-action: none;
    cursor: crosshair;
  }

  #hint {
    position: fixed;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.5);
    font-size: 13px;
    letter-spacing: 0.03em;
    pointer-events: none;
    transition: opacity 1s ease;
  }

  #panel {
    position: fixed;
    left: 50%;
    bottom: 20px;
    transform: translateX(-50%);
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    max-width: 92vw;
    background: rgba(20, 20, 30, 0.55);
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 18px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    z-index: 10;
  }

  .group {
    display: flex;
    gap: 6px;
    align-items: center;
    padding-right: 10px;
    border-right: 1px solid rgba(255,255,255,0.08);
  }
  .group:last-child { border-right: none; padding-right: 0; }

  button.mode, button.palette {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.75);
    font-size: 12px;
    padding: 7px 11px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.15s ease;
    white-space: nowrap;
  }
  button.mode:hover, button.palette:hover {
    background: rgba(255,255,255,0.12);
    color: #fff;
  }
  button.mode.active, button.palette.active {
    background: rgba(255,255,255,0.9);
    color: #111;
    border-color: transparent;
  }

  button.icon {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.75);
    font-size: 14px;
    width: 34px;
    height: 30px;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s ease;
  }
  button.icon:hover { background: rgba(255,255,255,0.15); color: #fff; }

  .swatch {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid rgba(255,255,255,0.15);
    transition: transform 0.15s ease, border-color 0.15s ease;
  }
  .swatch:hover { transform: scale(1.12); }
  .swatch.active { border-color: #fff; transform: scale(1.15); }

  label.slider-label {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    color: rgba(255,255,255,0.55);
    font-size: 10px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  input[type=range] {
    width: 70px;
    accent-color: #fff;
  }

  #count {
    color: rgba(255,255,255,0.4);
    font-size: 11px;
    font-variant-numeric: tabular-nums;
    min-width: 68px;
    text-align: right;
  }
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="hint">click &amp; drag to play &middot; try different modes below</div>

<div id="panel">
  <div class="group" id="modes">
    <button class="mode active" data-mode="attract">Attract</button>
    <button class="mode" data-mode="repel">Repel</button>
    <button class="mode" data-mode="flock">Flock</button>
    <button class="mode" data-mode="fountain">Fountain</button>
    <button class="mode" data-mode="fireworks">Fireworks</button>
  </div>

  <div class="group" id="palettes">
    <span class="swatch active" data-palette="rainbow" style="background:conic-gradient(red,yellow,lime,cyan,blue,magenta,red)"></span>
    <span class="swatch" data-palette="sunset" style="background:linear-gradient(135deg,#ff5f6d,#ffc371)"></span>
    <span class="swatch" data-palette="ocean" style="background:linear-gradient(135deg,#00c6ff,#0072ff)"></span>
    <span class="swatch" data-palette="neon" style="background:linear-gradient(135deg,#39ff14,#ff00ff)"></span>
  </div>

  <div class="group">
    <label class="slider-label">Size
      <input type="range" id="sizeSlider" min="1" max="8" step="0.5" value="3">
    </label>
    <label class="slider-label">Trail
      <input type="range" id="trailSlider" min="2" max="40" step="1" value="14">
    </label>
  </div>

  <div class="group">
    <button class="icon" id="clearBtn" title="Clear canvas">&#10005;</button>
    <span id="count">0 particles</span>
  </div>
</div>

<script>
(function() {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let W, H, DPR;

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  // ---------- State ----------
  const state = {
    mode: 'attract',
    palette: 'rainbow',
    baseSize: 3,
    trail: 14,
    pointer: { x: W/2, y: H/2, down: false, active: false },
    lastSpawn: 0,
    hue: 0
  };

  const MAX_PARTICLES = 2600;
  let particles = [];

  const palettes = {
    rainbow: () => {
      state.hue = (state.hue + 2.4) % 360;
      return `hsl(${state.hue}, 90%, 62%)`;
    },
    sunset: () => {
      const stops = ['#ff5f6d', '#ff9a44', '#ffc371', '#ff6f91'];
      return stops[Math.floor(Math.random() * stops.length)];
    },
    ocean: () => {
      const stops = ['#00c6ff', '#0072ff', '#38ffe0', '#3a7bd5'];
      return stops[Math.floor(Math.random() * stops.length)];
    },
    neon: () => {
      const stops = ['#39ff14', '#ff00ff', '#00fff9', '#faff00'];
      return stops[Math.floor(Math.random() * stops.length)];
    }
  };

  function pickColor() {
    return palettes[state.palette]();
  }

  function spawnParticle(x, y, opts = {}) {
    const angle = Math.random() * Math.PI * 2;
    const speed = opts.speed !== undefined ? opts.speed : Math.random() * 0.6;
    particles.push({
      x, y,
      vx: opts.vx !== undefined ? opts.vx : Math.cos(angle) * speed,
      vy: opts.vy !== undefined ? opts.vy : Math.sin(angle) * speed,
      r: state.baseSize + Math.random() * state.baseSize * 0.6,
      color: pickColor(),
      life: opts.life !== undefined ? opts.life : Infinity,
      maxLife: opts.life !== undefined ? opts.life : Infinity,
      decay: opts.decay || 0
    });
    if (particles.length > MAX_PARTICLES) {
      particles.splice(0, particles.length - MAX_PARTICLES);
    }
  }

  function burstFireworks(x, y) {
    const count = 60 + Math.floor(Math.random() * 40);
    const baseHueShift = Math.random() * 360;
    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 * i) / count + Math.random() * 0.2;
      const speed = 1.5 + Math.random() * 3.5;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        r: state.baseSize * 0.8 + Math.random() * state.baseSize * 0.5,
        color: state.palette === 'rainbow'
          ? `hsl(${(baseHueShift + Math.random()*40) % 360}, 95%, 62%)`
          : pickColor(),
        life: 60 + Math.random() * 40,
        maxLife: 100,
        decay: 0,
        gravity: 0.03
      });
    }
    if (particles.length > MAX_PARTICLES) {
      particles.splice(0, particles.length - MAX_PARTICLES);
    }
  }

  // ---------- Physics per mode ----------
  function step() {
    const p = state.pointer;

    for (let i = particles.length - 1; i >= 0; i--) {
      const pt = particles[i];

      if (state.mode === 'attract' && p.active) {
        const dx = p.x - pt.x, dy = p.y - pt.y;
        const dist = Math.sqrt(dx*dx + dy*dy) || 1;
        const force = Math.min(2200 / (dist*dist), 0.6);
        pt.vx += (dx/dist) * force;
        pt.vy += (dy/dist) * force;
      } else if (state.mode === 'repel' && p.active) {
        const dx = pt.x - p.x, dy = pt.y - p.y;
        const dist = Math.sqrt(dx*dx + dy*dy) || 1;
        if (dist < 260) {
          const force = Math.min(2200 / (dist*dist), 0.9);
          pt.vx += (dx/dist) * force;
          pt.vy += (dy/dist) * force;
        }
      } else if (state.mode === 'flock') {
        // light cohesion toward pointer + jitter for organic movement
        if (p.active) {
          const dx = p.x - pt.x, dy = p.y - pt.y;
          const dist = Math.sqrt(dx*dx + dy*dy) || 1;
          if (dist > 40) {
            pt.vx += (dx/dist) * 0.045;
            pt.vy += (dy/dist) * 0.045;
          }
        }
        pt.vx += (Math.random() - 0.5) * 0.12;
        pt.vy += (Math.random() - 0.5) * 0.12;
      }

      if (pt.gravity) pt.vy += pt.gravity;
      if (state.mode === 'fountain') pt.vy += 0.045;

      // damping
      pt.vx *= 0.985;
      pt.vy *= 0.985;

      pt.x += pt.vx;
      pt.y += pt.vy;

      if (pt.life !== Infinity) {
        pt.life -= 1;
        if (pt.life <= 0) { particles.splice(i, 1); continue; }
      }

      // soft bounds for ambient/attract/repel/flock particles
      if (pt.life === Infinity) {
        if (pt.x < -20) pt.x = W + 20;
        if (pt.x > W + 20) pt.x = -20;
        if (pt.y < -20) pt.y = H + 20;
        if (pt.y > H + 20) pt.y = -20;
      } else {
        if (pt.x < -50 || pt.x > W + 50 || pt.y < -50 || pt.y > H + 50) {
          particles.splice(i, 1);
        }
      }
    }
  }

  function draw() {
    // trail fade
    ctx.fillStyle = `rgba(5, 5, 10, ${state.trail / 100})`;
    ctx.fillRect(0, 0, W, H);

    for (const pt of particles) {
      let alpha = 1;
      if (pt.life !== Infinity) alpha = Math.max(pt.life / pt.maxLife, 0);
      ctx.beginPath();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = pt.color;
      ctx.shadowColor = pt.color;
      ctx.shadowBlur = 8;
      ctx.arc(pt.x, pt.y, pt.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;

    countEl.textContent = particles.length + ' particles';
  }

  function loop() {
    step();
    draw();
    requestAnimationFrame(loop);
  }

  // ---------- Input ----------
  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    if (e.touches && e.touches[0]) {
      return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
    }
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  }

  function onDown(e) {
    const pos = getPos(e);
    state.pointer.x = pos.x;
    state.pointer.y = pos.y;
    state.pointer.down = true;
    state.pointer.active = true;
    hint.style.opacity = '0';

    if (state.mode === 'fireworks') {
      burstFireworks(pos.x, pos.y);
    } else {
      for (let i = 0; i < 6; i++) spawnParticle(pos.x, pos.y);
    }
    e.preventDefault();
  }

  function onMove(e) {
    const pos = getPos(e);
    state.pointer.x = pos.x;
    state.pointer.y = pos.y;
    state.pointer.active = true;

    if (state.pointer.down) {
      const now = performance.now();
      if (state.mode === 'fountain' && now - state.lastSpawn > 12) {
        state.lastSpawn = now;
        for (let i = 0; i < 4; i++) {
          spawnParticle(pos.x, pos.y, {
            vx: (Math.random() - 0.5) * 2,
            vy: -3 - Math.random() * 2.5,
            life: 90 + Math.random() * 40
          });
        }
      } else if (state.mode !== 'fireworks' && state.mode !== 'fountain' && now - state.lastSpawn > 16) {
        state.lastSpawn = now;
        for (let i = 0; i < 3; i++) spawnParticle(pos.x, pos.y);
      } else if (state.mode === 'fireworks' && now - state.lastSpawn > 140) {
        state.lastSpawn = now;
        burstFireworks(pos.x, pos.y);
      }
    }
    e.preventDefault();
  }

  function onUp(e) {
    state.pointer.down = false;
  }

  canvas.addEventListener('mousedown', onDown);
  canvas.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);
  canvas.addEventListener('touchstart', onDown, { passive: false });
  canvas.addEventListener('touchmove', onMove, { passive: false });
  canvas.addEventListener('touchend', onUp);

  // ---------- UI wiring ----------
  const hint = document.getElementById('hint');
  const countEl = document.getElementById('count');

  document.querySelectorAll('button.mode').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('button.mode').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.mode = btn.dataset.mode;
    });
  });

  document.querySelectorAll('.swatch').forEach(sw => {
    sw.addEventListener('click', () => {
      document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
      sw.classList.add('active');
      state.palette = sw.dataset.palette;
    });
  });

  document.getElementById('sizeSlider').addEventListener('input', (e) => {
    state.baseSize = parseFloat(e.target.value);
  });
  document.getElementById('trailSlider').addEventListener('input', (e) => {
    state.trail = parseFloat(e.target.value);
  });
  document.getElementById('clearBtn').addEventListener('click', () => {
    particles = [];
    ctx.fillStyle = '#05050a';
    ctx.fillRect(0, 0, W, H);
  });

  // ---------- ambient seed ----------
  for (let i = 0; i < 60; i++) {
    spawnParticle(Math.random() * W, Math.random() * H, { speed: 0.3 });
  }

  ctx.fillStyle = '#05050a';
  ctx.fillRect(0, 0, W, H);
  loop();

  setTimeout(() => { hint.style.opacity = '0'; }, 4500);
})();
</script>
</body>
</html>
